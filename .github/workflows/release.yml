name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: engine
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            features: "vector-search"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            features: "vector-search"
          - target: x86_64-apple-darwin
            os: macos-15-intel
            use_cross: false
            features: "vector-search"
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            features: "vector-search"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            features: ""  # usearch POSIX bug (unum-cloud/usearch#715)

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          workspaces: engine

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
        working-directory: .

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} --package flapjack-server ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --package flapjack-server ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/flapjack staging/
          cd staging
          tar czf ../flapjack-${{ matrix.target }}.tar.gz .
          cd ..
          shasum -a 256 flapjack-${{ matrix.target }}.tar.gz > flapjack-${{ matrix.target }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/flapjack.exe staging/
          cd staging
          7z a ../flapjack-${{ matrix.target }}.zip .
          cd ..
          sha256sum flapjack-${{ matrix.target }}.zip > flapjack-${{ matrix.target }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        timeout-minutes: 5
        with:
          name: flapjack-${{ matrix.target }}
          path: |
            engine/flapjack-${{ matrix.target }}.*
          compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create tag
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            flapjack-*.tar.gz
            flapjack-*.tar.gz.sha256
            flapjack-*.zip
            flapjack-*.zip.sha256
